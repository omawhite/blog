version: 2
updates:
  # Keep npm dependencies up-to-date
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'daily'
    groups:
      nextjs:
        patterns:
          - 'next'
          - '@next/*'
      react:
        patterns:
          - 'react'
          - 'react-dom'
          - '@react/*'
      storybook:
        patterns:
          - 'storybook'
          - '@storybook/*'
      minor-and-patch:
        update-types:
          - 'minor'
          - 'patch'
    ignore:
      - dependency-name: '@types/node'
        update-types:
          - 'version-update:semver-major'

  # Keep GitHub Actions up-to-date
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'daily'
